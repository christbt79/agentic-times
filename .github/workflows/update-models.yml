name: Update model feed

# Refreshes _data/models.json daily from the Hugging Face Hub so the homepage
# MODEL_FEED ticker stays current. Free (GitHub-hosted), no API key needed.

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write
  pages: write

concurrency:
  group: update-model-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch latest models from Hugging Face
        run: python3 scripts/update_models.py

      - name: Commit & push if changed
        id: commit
        run: |
          if git diff --quiet -- _data/models.json; then
            echo "No model changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "agentic-times-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _data/models.json
            git commit -m "chore: refresh model feed"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger GitHub Pages build
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds" \
            && echo "Pages build requested" || echo "Pages build trigger skipped"
